name: RTPReloaded
version: '1.0.0'
main: dev.codex.rtpreloaded.RtpReloadedPlugin
api-version: '1.21'
author: Codex
description: A modern, stable, genuinely random RTP plugin.
folia-supported: true

commands:
  rtp:
    description: Randomly teleport yourself or another player.
    usage: /rtp [player] [world]
    aliases: [wild, randomtp]
  rtpreloaded:
    description: RTPReloaded admin commands.
    usage: /rtpreloaded <reload|debug|portal>
    aliases: [truertp]

permissions:
  rtpreloaded.use:
    description: Allows a player to use /rtp.
    default: true
  rtpreloaded.others:
    description: Allows a player to RTP another player.
    default: op
  rtpreloaded.reload:
    description: Allows reloading RTPReloaded configs.
    default: op
  rtpreloaded.debug:
    description: Allows toggling debug logging.
    default: op
  rtpreloaded.portal:
    description: Allows managing RTPReloaded portals.
    default: op
  truertp.use:
    description: Legacy alias for rtpreloaded.use.
    default: true
  truertp.others:
    description: Legacy alias for rtpreloaded.others.
    default: op
  truertp.reload:
    description: Legacy alias for rtpreloaded.reload.
    default: op
  truertp.debug:
    description: Legacy alias for rtpreloaded.debug.
    default: op
  truertp.portal:
    description: Legacy alias for rtpreloaded.portal.
    default: op