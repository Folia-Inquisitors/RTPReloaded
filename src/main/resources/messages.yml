prefix: "&8[&aTrueRTP&8]&r "
no-permission: "{prefix}&cYou do not have permission to do that."
players-only: "{prefix}&cOnly players can use that command without a target."
player-not-found: "{prefix}&cThat player is not online."
world-not-found: "{prefix}&cThat world does not exist."
world-disabled: "{prefix}&cRTP is disabled in &f{world}&c."
reload-complete: "{prefix}&aConfiguration reloaded."
debug-enabled: "{prefix}&eDebug logging is now &aenabled&e."
debug-disabled: "{prefix}&eDebug logging is now &cdisabled&e."
already-counting: "{prefix}&eYour previous RTP countdown was replaced."
countdown: "{prefix}&aTeleporting in &f{seconds}&a..."
countdown-cancelled-move: "{prefix}&cTeleport cancelled because you moved."
searching: "{prefix}&7Searching for a safe location in &f{world}&7..."
teleport-success: "{prefix}&aTeleported to &f{x}&a, &f{y}&a, &f{z}&a in &f{world}&a."
teleport-failed: "{prefix}&cCould not find a safe location after &f{attempts}&c attempts."
teleport-error: "{prefix}&cTeleport failed. Ask an admin to check the console."
usage-rtp: "{prefix}&eUse &f/rtp [world]&e or &f/rtp <player> [world]&e."
usage-admin: "{prefix}&eUse &f/truertp reload&e, &f/truertp debug&e, or &f/truertp portal&e."
usage-portal: "{prefix}&eUse &f/truertp portal pos1&e, &fpos2&e, then &fcreate <portal-name> <target-world>&e. You can also use &fpos1 <portal-name>&e or &fpos2 <portal-name>&e to edit an existing portal."
portal-created: "{prefix}&aCreated portal &f{portal}&a in &f{portal_world}&a targeting &f{target_world}&a. Set corners with &f/truertp portal pos1 {portal}&a and &f/truertp portal pos2 {portal}&a."
portal-ready: "{prefix}&aPortal &f{portal}&a is ready."
portal-not-found: "{prefix}&cPortal &f{portal}&c does not exist."
portal-not-found-use-create: "{prefix}&cPortal &f{portal}&c does not exist. Use &f/truertp portal pos1&c, &f/truertp portal pos2&c, then &f/truertp portal create {portal} <target-world>&c."
portal-selection-pos1-set: "{prefix}&aSet pending portal corner 1 at &f{x}, {y}, {z}&a in &f{world}&a. A temporary glowstone marker was shown."
portal-selection-pos2-set: "{prefix}&aSet pending portal corner 2 at &f{x}, {y}, {z}&a in &f{world}&a. A temporary glowstone marker was shown."
portal-selection-ready: "{prefix}&aSelection ready. Create it with &f/truertp portal create <portal-name> <target-world>&a."
portal-selection-world-mismatch: "{prefix}&cPortal corners must be in the same world. Set pos1 and pos2 again."
portal-pos1-set: "{prefix}&aSet portal &f{portal}&a corner 1 at &f{x}, {y}, {z}&a in &f{world}&a. A temporary glowstone marker was shown."
portal-pos2-set: "{prefix}&aSet portal &f{portal}&a corner 2 at &f{x}, {y}, {z}&a in &f{world}&a. A temporary glowstone marker was shown."
portal-deleted: "{prefix}&aDeleted portal &f{portal}&a."
portal-list-empty: "{prefix}&eNo portals are configured."
portal-list: "{prefix}&aConfigured portals: &f{portals}&a."
portal-enabled: "{prefix}&aEnabled portal &f{portal}&a."
portal-disabled: "{prefix}&eDisabled portal &f{portal}&e."
portal-target-set: "{prefix}&aPortal &f{portal}&a now targets &f{target_world}&a."
